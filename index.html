<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EGY Noon Minutes Logistics — Org Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF0F3;
    --grid:#E0E3E9;
    --surface:#FFFFFF;
    --ink:#1B2330;
    --muted:#6A7281;
    --faint:#9AA1AD;
    --line:#C3C9D4;
    --border:#E4E7EC;
    --accent:#F2B705;
    --accent-soft:#FBEFC9;
    --accent-ink:#7A5B00;
    --danger:#C0492F;
    --shadow:0 1px 2px rgba(20,28,44,.05),0 8px 22px rgba(20,28,44,.07);
    --shadow-hover:0 2px 4px rgba(20,28,44,.08),0 16px 34px rgba(20,28,44,.12);
    --radius:14px;
    --card-w:234px;
    --conn:30px;
    --l1:#2C5F8A;
    --l1-soft:#E8F0F7;
    --supervisor:#6B3FA0;
    --supervisor-soft:#F0EAF9;
    --tl:#1E7A5C;
    --tl-soft:#E4F4EE;
    --root-bg:#FDF6E3;
    --root-border:#DCC78A;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:"Inter",system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }

  /* ═══════════════════════════════════════
     HEADER — single unwrapped row
  ═══════════════════════════════════════ */
  header{
    flex:0 0 auto;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:0 18px;
    height:56px;
    display:flex;
    align-items:center;
    gap:14px;
    overflow:hidden;          /* keeps everything on one line */
    z-index:20;
    white-space:nowrap;
  }

  /* Brand */
  .brand{ display:flex; align-items:center; gap:10px; flex:0 0 auto; }
    .mark{ height:46px; display:flex; align-items:center; flex:0 0 auto; }
  .mark img{ height:46px; width:auto; display:block; border-radius:8px; }
  .brand-text .eyebrow{
    font-size:9.5px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--faint); font-weight:600; line-height:1.3;
  }
  .brand-text h1{
    font-family:"Space Grotesk",sans-serif;
    font-size:14.5px; font-weight:700; letter-spacing:-.01em;
    margin:0; line-height:1.15; color:var(--ink); white-space:nowrap;
  }

  /* Divider */
  .hdiv{ width:1px; height:26px; background:var(--border); flex:0 0 auto; }

  /* Stat chips */
  .stats{ display:flex; gap:6px; flex:0 0 auto; }
  .chip{
    display:flex; align-items:baseline; gap:5px;
    background:var(--bg); border:1px solid var(--border);
    border-radius:999px; padding:4px 11px; white-space:nowrap;
  }
  .chip b{ font-family:"Space Grotesk",sans-serif; font-size:13.5px; font-weight:700; }
  .chip span{ font-size:11px; color:var(--muted); }
  .chip.open b{ color:var(--accent-ink); }

  /* Push controls to the right */
  .spacer{ flex:1 1 auto; min-width:8px; }

  /* Search */
  .search{ position:relative; display:flex; align-items:center; flex:0 0 auto; }
  .search svg{ position:absolute; left:10px; width:14px; height:14px; color:var(--faint); pointer-events:none; }
  .search input{
    font-family:inherit; font-size:12.5px; color:var(--ink);
    border:1px solid var(--border); background:var(--bg);
    border-radius:999px; padding:7px 12px 7px 30px; width:170px;
    transition:border-color .15s,box-shadow .15s,background .15s;
  }
  .search input:focus{ outline:none; border-color:var(--accent); background:var(--surface); box-shadow:0 0 0 3px var(--accent-soft); }
  .search input::placeholder{ color:var(--faint); }

  /* Buttons */
  .btn{
    font-family:inherit; font-size:12px; font-weight:500; color:var(--ink);
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:7px 11px; cursor:pointer; line-height:1;
    display:inline-flex; align-items:center; gap:5px; flex:0 0 auto;
    transition:border-color .15s,background .15s,transform .05s; white-space:nowrap;
  }
  .btn:hover{ border-color:var(--line); background:#FAFBFC; }
  .btn:active{ transform:translateY(1px); }

  /* Zoom group */
  .zoomgroup{
    display:flex; align-items:stretch; flex:0 0 auto;
    border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface);
  }
  .zoomgroup button{
    border:0; background:transparent; cursor:pointer; padding:0 9px;
    color:var(--ink); display:grid; place-items:center;
    border-right:1px solid var(--border);
  }
  .zoomgroup button:last-child{ border-right:0; }
  .zoomgroup button:hover{ background:#FAFBFC; }
  .zoomgroup .zlevel{
    min-width:40px; text-align:center; font-size:11.5px; font-variant-numeric:tabular-nums;
    color:var(--muted); display:grid; place-items:center; padding:0 2px;
    border-right:1px solid var(--border);
  }
  .zoomgroup svg{ width:14px; height:14px; }

  /* Sync pill */
  .sync{ display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--muted); flex:0 0 auto; white-space:nowrap; }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--faint); flex:0 0 auto; }
  .sync.live .dot{ background:var(--accent); }
  .sync.syncing .dot{ background:var(--accent); }
  .sync.error .dot{ background:var(--danger); }
  .sync .slabel b{ color:var(--ink); font-weight:600; }
  .sync .retry{ color:var(--accent-ink); cursor:pointer; text-decoration:underline; font-weight:500; }

  /* ═══════════════════════════════════════
     CANVAS
  ═══════════════════════════════════════ */
  .canvas{
    flex:1 1 auto; min-height:0; overflow:auto; position:relative;
    background-color:var(--bg);
    background-image:radial-gradient(var(--grid) 1.2px,transparent 1.2px);
    background-size:24px 24px;
  }
  .stage{
    min-width:max-content; min-height:max-content;
    padding:50px 80px 110px;
    display:flex; justify-content:center;
  }

  /* ═══════════════════════════════════════
     TREE LAYOUT
     Root card centred at top.
     Layer-1 (direct reports) spread HORIZONTALLY below it.
     Each L1's children stack VERTICALLY beneath them.
  ═══════════════════════════════════════ */

  /* Root wrapper */
  .root-col{ display:flex; flex-direction:column; align-items:center; }

  /* Trunk line: root → horizontal bar */
  .trunk{ width:2px; height:var(--conn); background:var(--line); }

  /* Horizontal row of L1 managers */
  .l1-row{ display:flex; align-items:flex-start; position:relative; }

  /* Horizontal crossbar connecting siblings */
  .l1-row::before{
    content:''; position:absolute;
    top:0; left:0; right:0;
    height:2px; background:var(--line);
    /* trim to span only between first and last child centres */
    margin:0;
  }

  /* Each L1 column */
  .l1-col{
    display:flex; flex-direction:column; align-items:center;
    padding:0 18px;
    position:relative;
  }

  /* Vertical drop from crossbar to L1 card */
  .l1-drop{ width:2px; height:var(--conn); background:var(--line); }

  /* Vertical trunk from L1 card down to its children */
  .l1-trunk{ width:2px; height:var(--conn); background:var(--line); }

  /* Children of an L1 — vertical stack */
  .vc-block{ display:flex; flex-direction:column; align-items:flex-start; position:relative; }

  /* Left rail that connects siblings */
  .vc-rail{
    position:absolute; left:22px; top:0; bottom:0; width:2px; background:var(--line);
  }
  /* Clip rail: starts at centre of first child, ends at centre of last */
  .vc-block > .vc-item:first-child .vc-rail{ top:50%; }
  .vc-block > .vc-item:last-child  .vc-rail{ bottom:50%; }
  .vc-block > .vc-item:only-child  .vc-rail{ display:none; }

  /* Each child item row */
  .vc-item{ display:flex; align-items:center; position:relative; padding:7px 0; }

  /* Horizontal arm from rail to card */
  .vc-arm{ width:22px; height:2px; background:var(--line); flex:0 0 auto; margin-left:22px; }

  /* ── node wrapper (holds card + toggle btn) ── */
  .node{ position:relative; display:inline-block; }

  /* ═══════════════════════════════════════
     CARDS
  ═══════════════════════════════════════ */
  .card{
    position:relative; width:var(--card-w);
    background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:15px 15px 13px;
    transition:box-shadow .18s,transform .18s,border-color .18s;
  }
  .card:hover{ box-shadow:var(--shadow-hover); transform:translateY(-2px); border-color:var(--line); }

  /* ROOT — warm amber background */
  .card.root{
    background:var(--root-bg);
    border-color:var(--root-border);
    border-width:1.5px;
  }
  .card.root::before{
    content:''; position:absolute; inset:0 0 auto 0; height:4px;
    background:linear-gradient(90deg,var(--accent),#F6C944);
    border-radius:var(--radius) var(--radius) 0 0;
  }

  /* L1 manager */
  .card.layer1{ border-left:4px solid var(--l1); border-color:var(--l1); }
  .card.layer1 .avatar{ background:var(--l1) !important; }

  /* Supervisor */
  .card.role-supervisor{ border-left:4px solid var(--supervisor); }
  .card.role-supervisor .avatar{ background:var(--supervisor) !important; }

  /* Team Leader */
  .card.role-tl{ border-left:4px solid var(--tl); }
  .card.role-tl .avatar{ background:var(--tl) !important; }

  /* Role pill badge */
  .role-pill{
    display:inline-flex; align-items:center; gap:5px;
    font-size:9.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    border-radius:999px; padding:3px 8px; margin-bottom:8px;
  }
  .role-pill.pill-mgr{ background:var(--l1-soft); color:var(--l1); }
  .role-pill.pill-sup{ background:var(--supervisor-soft); color:var(--supervisor); }
  .role-pill.pill-tl{ background:var(--tl-soft); color:var(--tl); }
  .role-pill .dot-sm{ width:5px; height:5px; border-radius:50%; background:currentColor; }

  .card.vacant{ background:#F8F9FB; border-style:dashed; border-color:#CDD3DD; box-shadow:none; border-left-width:1px; }
  .card.vacant:hover{ box-shadow:var(--shadow); }
  .card.dim{ opacity:.28; filter:saturate(.5); }
  .card.hit{ border-color:var(--accent) !important; box-shadow:0 0 0 3px var(--accent-soft),var(--shadow) !important; }

  .top{ display:flex; gap:11px; align-items:center; }
  .avatar{
    width:44px; height:44px; border-radius:10px; flex:0 0 auto;
    display:grid; place-items:center; color:#fff;
    font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:14px;
    overflow:hidden; position:relative;
  }
  .avatar img{
    width:100%; height:100%; object-fit:cover; object-position:center top;
    border-radius:10px; display:block; position:absolute; inset:0;
  }
  .avatar img[src]{ opacity:1; }
  .avatar.vac{ background:transparent !important; color:var(--faint); border:1.5px dashed #C2C8D2; }
  .who{ min-width:0; flex:1; }
  .pname{
    font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:14.5px;
    line-height:1.2; letter-spacing:-.01em; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .pname.vac{ color:var(--faint); font-style:italic; font-weight:500; }
  .ptitle{
    font-size:11px; line-height:1.35; color:var(--muted); margin-top:3px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .reports-up{
    font-size:10px; letter-spacing:.04em; color:var(--faint);
    text-transform:uppercase; font-weight:600; margin-bottom:7px;
    display:flex; align-items:center; gap:5px;
  }
  .reports-up svg{ width:10px; height:10px; }

  .contacts{ display:flex; flex-direction:column; gap:5px; margin-top:11px; }
  .contact{
    width:100%; min-width:0; display:flex; align-items:center; gap:6px;
    border:1px solid var(--border); border-radius:8px; padding:5px 8px;
    font-size:10.5px; color:var(--ink); text-decoration:none; background:var(--surface);
    transition:background .14s,border-color .14s,color .14s;
  }
  .contact svg{ width:12px; height:12px; flex:0 0 auto; color:var(--muted); transition:color .14s; }
  .contact .val{
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    font-variant-numeric:tabular-nums; font-size:10px; flex:1; min-width:0;
  }
  a.contact:hover{ border-color:var(--ink); background:var(--ink); color:#fff; }
  a.contact:hover svg{ color:var(--accent); }
  a.contact:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .contact.empty{ color:var(--faint); border-style:dashed; cursor:default; }
  .contact.empty svg{ color:var(--faint); }

  .foot{ display:flex; align-items:center; margin-top:11px; }
  .tenure{
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; color:var(--muted); font-weight:500; flex-wrap:wrap;
  }
  .tenure svg{ width:11px; height:11px; color:var(--faint); flex:0 0 auto; }
  .tenure .ten-label{ color:var(--muted); font-weight:500; white-space:nowrap; }
  .tenure b{ color:var(--ink); font-weight:600; font-variant-numeric:tabular-nums; }
  .tenure.future b{ color:var(--accent-ink); }
  .pill-open{
    font-size:9.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    color:var(--accent-ink); background:var(--accent-soft);
    border-radius:999px; padding:3px 9px;
  }

  /* Toggle button */
  .toggle{
    position:absolute; bottom:-13px; left:50%; transform:translateX(-50%);
    width:25px; height:25px; border-radius:50%; z-index:3;
    background:var(--surface); border:2px solid var(--line); color:var(--ink);
    display:grid; place-items:center; cursor:pointer; padding:0;
    box-shadow:0 1px 3px rgba(20,28,44,.12);
    transition:border-color .15s,color .15s,transform .05s;
  }
  .toggle:hover{ border-color:var(--accent); color:var(--accent-ink); }
  .toggle:active{ transform:translateX(-50%) scale(.9); }
  .toggle svg{ width:12px; height:12px; }
  .toggle .cnt{
    position:absolute; top:-8px; right:-9px; min-width:15px; height:15px; padding:0 3px;
    background:var(--ink); color:#fff; border-radius:999px;
    font-size:9px; font-weight:600; display:grid; place-items:center; line-height:1;
  }

  /* ═══════════════════════════════════════
     LEGEND — bottom-right, small
  ═══════════════════════════════════════ */
  .legend{
    position:fixed; bottom:16px; right:20px;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(6px);
    border:1px solid var(--border);
    border-radius:10px; padding:9px 14px;
    display:flex; flex-direction:column; gap:6px;
    box-shadow:0 2px 12px rgba(20,28,44,.10); z-index:30;
  }
  .legend-title{
    font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:var(--faint); padding-bottom:3px; border-bottom:1px solid var(--border);
  }
  .legend-item{ display:flex; align-items:center; gap:8px; font-size:11px; font-weight:500; color:var(--ink); }
  .legend-swatch{ width:10px; height:10px; border-radius:3px; flex:0 0 auto; }

  /* Animations */
  @media (prefers-reduced-motion:no-preference){
    .node{ animation:rise .35s cubic-bezier(.2,.7,.3,1) both; }
    @keyframes rise{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .sync.live .dot{ animation:pulse 2.2s ease-out infinite; }
    @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(242,183,5,.5)} 70%{box-shadow:0 0 0 7px rgba(242,183,5,0)} 100%{box-shadow:0 0 0 0 rgba(242,183,5,0)} }
  }

  .empty-state{ margin:auto; text-align:center; color:var(--muted); padding:60px; }
  .empty-state h2{ font-family:"Space Grotesk"; color:var(--ink); margin:0 0 6px; }
  /* ══ STORES PAGE ══ */
  #page-stores{ flex-direction:column; }
  .sb-stats{ flex:0 0 auto; display:flex; align-items:stretch; background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; }
  .sb-stat{ display:flex; flex-direction:column; justify-content:center; padding:12px 28px 12px 0; margin-right:28px; border-right:1px solid var(--border); }
  .sb-stat:last-child{ border-right:none; margin-right:0; }
  .sb-stat-num{ font-family:"Space Grotesk",sans-serif; font-size:26px; font-weight:700; color:var(--ink); line-height:1; margin-bottom:3px; }
  .sb-stat-label{ font-size:11px; color:var(--muted); font-weight:500; white-space:nowrap; }
  .sb-stat-num.green{ color:#1E7A5C; }
  .sb-stat-num.amber{ color:#B8860B; }
  .sb-filters{ flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:10px 24px; background:var(--bg); border-bottom:1px solid var(--border); }
  .sb-search{ height:32px; padding:0 12px; border-radius:8px; border:1px solid var(--border); background:var(--surface); font-size:12.5px; color:var(--ink); font-family:inherit; outline:none; width:200px; }
  .sb-search:focus{ border-color:var(--line); }
  .sb-filter-btn{ height:32px; padding:0 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface); font-size:12px; font-weight:500; color:var(--muted); cursor:pointer; font-family:inherit; transition:all .14s; white-space:nowrap; }
  .sb-filter-btn:hover{ border-color:var(--line); color:var(--ink); }
  .sb-filter-btn.active{ color:#fff; border-color:transparent; }
  /* 3-column body */
  .sb-body{ flex:1 1 auto; min-height:0; display:flex; overflow:hidden; }
  /* Side panels — team members */
  .sb-side-panel{
    flex:0 0 230px; min-height:0; overflow-y:auto;
    display:flex; flex-direction:column;
  }
  .sb-side-left{ border-right:1px solid var(--border); }
  .sb-side-right{ border-left:1px solid var(--border); }
  /* panel heading */
  .sb-panel-heading{
    position:sticky; top:0; z-index:2;
    font-family:"Space Grotesk",sans-serif; font-size:11.5px; font-weight:700;
    color:#fff; padding:10px 14px;
    display:flex; align-items:center; gap:8px;
    letter-spacing:.01em;
  }
  /* member row — fades from manager color to white */
  .sb-member{
    display:flex; flex-direction:column; gap:6px;
    padding:10px 12px; border-bottom:1px solid rgba(0,0,0,.06);
    transition:filter .12s;
  }
  .sb-member:hover{ filter:brightness(.96); }
  .sb-member-top{ display:flex; align-items:center; gap:8px; }
  .sb-member-av{
    width:30px; height:30px; border-radius:7px; flex:0 0 auto;
    display:grid; place-items:center; overflow:hidden;
    font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:10px; color:#fff;
    box-shadow:0 1px 4px rgba(0,0,0,.18);
  }
  .sb-member-av img{ width:100%; height:100%; object-fit:cover; object-position:center top; border-radius:6px; }
  .sb-member-meta{ flex:1; min-width:0; }
  .sb-member-name{
    font-size:11px; font-weight:700; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3;
  }
  .sb-member-title{
    font-size:9.5px; color:var(--muted);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px;
  }
  .sb-member-role{
    font-size:8.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    padding:2px 6px; border-radius:999px; flex:0 0 auto; white-space:nowrap;
  }
  .role-sup{ background:rgba(107,63,160,.15); color:var(--supervisor); }
  .role-tl{ background:rgba(30,122,92,.15); color:var(--tl); }
  /* contact buttons row */
  .sb-member-btns{ display:flex; gap:4px; }
  .sb-member-btn{
    flex:1; height:22px; border:1px solid rgba(0,0,0,.12); border-radius:6px;
    background:rgba(255,255,255,.55); cursor:pointer; font-size:9px; font-weight:500;
    color:var(--ink); display:flex; align-items:center; justify-content:center; gap:3px;
    text-decoration:none; font-family:inherit; transition:all .12s; backdrop-filter:blur(4px);
  }
  .sb-member-btn svg{ width:10px; height:10px; flex:0 0 auto; }
  .sb-member-btn.call:hover{ background:#1E7A5C; color:#fff; border-color:#1E7A5C; }
  .sb-member-btn.mail:hover{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); }
  .sb-member-btn.wa:hover{ background:#25D366; color:#fff; border-color:#25D366; }
  /* Centre board */
  .sb-board{ flex:1 1 auto; min-height:0; overflow:auto; display:flex; gap:16px; padding:20px 20px 24px; align-items:flex-start; justify-content:center; }
  .sb-col{ flex:0 0 300px; display:flex; flex-direction:column; gap:0; }
  .sb-col-header{ display:flex; align-items:center; gap:10px; padding:11px 13px; border-radius:10px 10px 0 0; font-family:"Space Grotesk",sans-serif; font-size:13px; font-weight:700; color:#fff; }
  .sb-col-header-count{ margin-left:auto; background:rgba(255,255,255,.25); font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; }
  .sb-col-body{ background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 10px 10px; overflow:hidden; }
  .sb-card{ display:flex; align-items:center; gap:9px; padding:9px 12px; border-bottom:1px solid var(--border); transition:background .12s; }
  .sb-card:last-child{ border-bottom:none; }
  .sb-card:hover{ background:var(--bg); }
  .sb-card.hidden{ display:none; }
  .sb-card-icon{ width:28px; height:28px; border-radius:7px; display:grid; place-items:center; flex:0 0 auto; }
  .sb-card-body{ flex:1; min-width:0; }
  .sb-card-name{ font-size:12px; font-weight:500; color:var(--ink); line-height:1.3; }
  .sb-card-badge{ font-size:9px; font-weight:700; padding:2px 7px; border-radius:999px; flex:0 0 auto; white-space:nowrap; text-transform:uppercase; letter-spacing:.04em; }
  .badge-active{ background:#E4F4EE; color:#1E7A5C; }
  .badge-soon{ background:#FEF3C7; color:#92620A; }
  .sb-card{ display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:8px; border:1px solid var(--border); background:var(--surface); transition:box-shadow .15s,transform .15s,border-color .15s; }
  .sb-card:hover{ box-shadow:var(--shadow); transform:translateY(-1px); border-color:var(--line); }
  .sb-card.hidden{ display:none; }
  .sb-card-icon{ width:32px; height:32px; border-radius:8px; display:grid; place-items:center; flex:0 0 auto; }
  .sb-card-body{ flex:1; min-width:0; }
  .sb-card-name{ font-size:12px; font-weight:600; color:var(--ink); line-height:1.3; }
  .sb-card-meta{ font-size:10.5px; color:var(--muted); margin-top:1px; }
  .sb-card-badge{ font-size:9.5px; font-weight:700; padding:2px 8px; border-radius:999px; flex:0 0 auto; white-space:nowrap; text-transform:uppercase; letter-spacing:.04em; }
  .badge-active{ background:#E4F4EE; color:#1E7A5C; }
  .badge-soon{ background:#FEF3C7; color:#92620A; }
  .empty-state{ margin:auto; text-align:center; color:var(--muted); padding:60px; }
  .empty-state h2{ font-family:"Space Grotesk"; color:var(--ink); margin:0 0 6px; }

  /* ── NAV TABS ── */
  .nav-tabs{ flex:0 0 auto; display:flex; align-items:stretch; background:var(--surface); border-bottom:1px solid var(--border); padding:0 18px; gap:0; }
  .nav-tab{ display:flex; align-items:center; gap:7px; padding:0 18px; font-size:12.5px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2.5px solid transparent; margin-bottom:-1px; transition:color .15s,border-color .15s; white-space:nowrap; user-select:none; height:42px; }
  .nav-tab:hover{ color:var(--ink); }
  .nav-tab.active{ color:var(--ink); border-bottom-color:var(--accent); }
  .nav-tab[data-tab="org"]{ color:#fff; background:#1a3a6b; border-radius:6px 6px 0 0; margin:4px 0 0 0; }
  .nav-tab[data-tab="org"]:hover{ color:#fff; background:#1e4480; }
  .nav-tab[data-tab="org"].active{ color:#fff; border-bottom-color:#1a3a6b; background:#122d54; }
  .nav-tab[data-tab="org"] svg{ stroke:#fff; }
  .nav-tab[data-tab="stores"]{ color:#fff; background:#2E7D32; border-radius:6px 6px 0 0; margin:4px 0 0 4px; }
  .nav-tab[data-tab="stores"]:hover{ color:#fff; background:#388E3C; }
  .nav-tab[data-tab="stores"].active{ color:#fff; border-bottom-color:#2E7D32; background:#1B5E20; }
  .nav-tab[data-tab="stores"] svg{ stroke:#fff; }
  .nav-tab[data-tab="oncall"]{ color:#111; background:#D4A017; border-radius:6px 6px 0 0; margin:4px 0 0 4px; }
  .nav-tab[data-tab="oncall"]:hover{ color:#111; background:#e0aa1a; }
  .nav-tab[data-tab="oncall"].active{ color:#111; border-bottom-color:#D4A017; background:#b88b12; }
  .nav-tab[data-tab="oncall"] svg{ stroke:#111; }
  .nav-tab svg{ width:14px; height:14px; flex:0 0 auto; }
  .live-pill{ font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; background:#1E7A5C; color:#fff; padding:2px 7px; border-radius:999px; }

  /* ── PAGES ── */
  .page{ display:none; flex:1 1 auto; flex-direction:column; min-height:0; overflow:hidden; position:absolute; width:0; height:0; pointer-events:none; }
  .page.active{ display:flex; position:relative; width:auto; height:auto; pointer-events:auto; flex:1 1 auto; overflow:hidden; }
  #page-org{ overflow:hidden; }

  /* ── ON-CALL PAGE ── */
  .oc-scroll{ flex:1 1 auto; min-height:0; overflow-y:auto; padding:32px 32px 80px; background-color:var(--bg); background-image:radial-gradient(var(--grid) 1.2px,transparent 1.2px); background-size:24px 24px; }
  .oc-inner{ max-width:880px; margin:0 auto; }
  .oc-hero{ background:linear-gradient(135deg,#0f1f3d 0%,#1b3d72 55%,#0e3a52 100%); border-radius:16px; padding:28px 32px; margin-bottom:28px; display:flex; flex-direction:column; align-items:stretch; position:relative; overflow:hidden; }
  .oc-hero::before{ content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 75% 50%,rgba(242,183,5,.12) 0%,transparent 60%); pointer-events:none; }
  .oc-hero-av{ width:64px; height:64px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center; overflow:hidden; font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:20px; color:#fff; border:2px solid rgba(255,255,255,.18); background:#3E5C76; }
  .oc-hero-av img{ width:100%; height:100%; object-fit:cover; object-position:center top; border-radius:10px; }
  .oc-hero-name{ font-family:"Space Grotesk",sans-serif; font-size:22px; font-weight:700; color:#fff; line-height:1.2; margin-bottom:4px; }
  .oc-hero-date{ font-size:12px; color:rgba(255,255,255,.52); margin-bottom:16px; }
  .oc-hero-btns{ display:flex; gap:10px; flex-wrap:wrap; }
  .oc-hero-btn{ display:inline-flex; align-items:center; gap:8px; padding:9px 20px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none; font-family:inherit; border:none; transition:all .15s; white-space:nowrap; }
  .oc-hero-btn svg{ width:16px; height:16px; flex:0 0 auto; }
  .oc-hero-btn.primary{ background:var(--accent); color:var(--accent-ink); }
  .oc-hero-btn.primary:hover{ background:#F6C944; }
  .oc-hero-btn.secondary{ background:rgba(255,255,255,.13); color:#fff; border:1px solid rgba(255,255,255,.22); }
  .oc-hero-btn.secondary:hover{ background:rgba(255,255,255,.22); }
  .oc-hero-btn.whatsapp{ background:#25D366; color:#fff; }
  .oc-hero-btn.whatsapp:hover{ background:#1ebe5d; }
  .oc-hero-panels{ display:flex; gap:0; flex-wrap:wrap; width:100%; }
  .oc-hero-panel{ display:flex; align-items:center; gap:20px; flex:1 1 280px; padding:4px 0; }
  .oc-hero-divider{ width:1px; background:rgba(255,255,255,.15); margin:0 24px; flex:0 0 1px; align-self:stretch; min-height:80px; }
  .oc-eyebrow-top{ font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:14px; display:flex; align-items:center; gap:7px; }
  .oc-pulse{ width:7px; height:7px; border-radius:50%; background:#2DB894; flex:0 0 auto; animation:oc-pulse 2.2s ease-out infinite; }
  @keyframes oc-pulse{0%{box-shadow:0 0 0 0 rgba(45,184,148,.6)}70%{box-shadow:0 0 0 7px rgba(45,184,148,0)}100%{box-shadow:0 0 0 0 rgba(45,184,148,0)}}
  .oc-section{ font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin-bottom:13px; display:flex; align-items:center; gap:10px; }
  .oc-section::after{ content:''; flex:1; height:1px; background:var(--border); }
  .oc-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(255px,1fr)); gap:12px; margin-bottom:28px; }
  .oc-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; display:flex; flex-direction:column; gap:12px; box-shadow:var(--shadow); transition:box-shadow .18s,transform .18s,border-color .18s; }
  .oc-card:hover{ box-shadow:var(--shadow-hover); transform:translateY(-2px); border-color:var(--line); }
  .oc-card.is-past{ opacity:.35; filter:saturate(.35); pointer-events:none; }
  .oc-person{ display:flex; align-items:center; gap:10px; }
  .oc-av{ width:38px; height:38px; border-radius:9px; flex:0 0 auto; display:grid; place-items:center; overflow:hidden; font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:13px; color:#fff; }
  .oc-av img{ width:100%; height:100%; object-fit:cover; object-position:center top; border-radius:7px; }
  .oc-name{ font-family:"Space Grotesk",sans-serif; font-size:13.5px; font-weight:600; color:var(--ink); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .oc-name-block{ display:flex; flex-direction:column; gap:4px; min-width:0; flex:1; }
  .oc-wa-btn{ display:inline-flex; align-items:center; gap:5px; font-size:10.5px; font-weight:600; color:#25D366; text-decoration:none; width:fit-content; }
  .oc-wa-btn svg{ width:12px; height:12px; flex:0 0 auto; }
  .oc-wa-btn:hover{ color:#1ebe5d; }
  .oc-card-date{ font-size:11px; font-weight:600; color:var(--muted); white-space:nowrap; }
  .oc-contacts{ display:flex; flex-direction:column; gap:5px; }
  .oc-contacts .contact{ white-space:nowrap; }
</style>
</head>

let DATA=[],ROOTS=[],collapsed=new Set(),query="",zoom=1,lastSync=null;

/* ── CSV ── */
function parseCSV(text){
  const rows=[];let row=[],field="",q=false,i=0;
  while(i<text.length){
    const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){field+='"';i+=2;continue;}q=false;i++;continue;}field+=c;i++;continue;}
    if(c==='"'){q=true;i++;continue;}
    if(c===','){row.push(field);field="";i++;continue;}
    if(c==='\r'){i++;continue;}
    if(c==='\n'){row.push(field);rows.push(row);row=[];field="";i++;continue;}
    field+=c;i++;
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}
function colIdx(h,...n){
  const lh=h.map(s=>s.toLowerCase().trim());
  for(const x of n){const i=lh.indexOf(x);if(i>=0)return i;}
  for(const x of n){const i=lh.findIndex(s=>s.includes(x));if(i>=0)return i;}
  return -1;
}
function buildFromCSV(text){
  const rows=parseCSV(text).filter(r=>r.some(c=>(c||"").trim()!==""));
  if(!rows.length)return[];
  const h=rows[0];
  const ci={name:colIdx(h,"name"),mail:colIdx(h,"mail","email"),mobile:colIdx(h,"mobile number","mobile","phone"),
    title:colIdx(h,"title","position","role"),reports:colIdx(h,"reports to","reports","manager"),
    join:colIdx(h,"joining date","join","start date"),
    photo:colIdx(h,"photo","picture","image","pic")};
  const g=(r,i)=>(i>=0&&r[i]!=null)?String(r[i]).trim():"";
  return rows.slice(1).map((r,idx)=>({id:idx,name:g(r,ci.name),mail:g(r,ci.mail),
    mobile:g(r,ci.mobile),title:g(r,ci.title),reports:g(r,ci.reports),join:g(r,ci.join),
    photo:g(r,ci.photo)}))
    .filter(p=>p.name||p.title);
}

/* ── ROLE ── */
function isVacant(p){return p.name.toLowerCase()==="to be filled"||p.name==="";}
function keyOf(p){return(p.name+"|"+p.title+"|"+p.reports).toLowerCase();}
function classifyRole(p){
  const t=(p.title||"").toLowerCase();
  if(!p.parent)return"root";
  if(p.parent&&!p.parent.parent)return"manager";
  if(t.includes("supervisor"))return"supervisor";
  if(t.includes("team leader")||t.includes("team lead"))return"tl";
  return"other";
}

/* ── TREE ── */
function buildTree(people){
  const byName={};
  people.forEach(p=>{if(!isVacant(p))byName[p.name.toLowerCase()]=p;});
  people.forEach(p=>{p.children=[];p.parent=null;});
  const roots=[];
  people.forEach(p=>{
    const mgr=p.reports?byName[p.reports.toLowerCase()]:null;
    if(mgr&&mgr!==p){mgr.children.push(p);p.parent=mgr;}else roots.push(p);
  });
  return roots;
}

/* ── TENURE ── */
function parseDate(s){
  if(!s)return null;s=s.trim();
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(m)return new Date(+m[3],+m[1]-1,+m[2]);
  m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  const d=new Date(s);return isNaN(d)?null:d;
}
function fmtShort(d){return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});}
function fmtLong(d){return d.toLocaleDateString(undefined,{year:"numeric",month:"long",day:"numeric"});}
function tenure(j){
  const d=parseDate(j);
  if(!d)return{text:"Not set",title:"Joining date not recorded",cls:"none"};
  const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if(d>today)return{text:"Starts "+fmtShort(d),title:"Joins "+fmtLong(d),cls:"future"};
  let y=today.getFullYear()-d.getFullYear(),mo=today.getMonth()-d.getMonth(),day=today.getDate()-d.getDate();
  if(day<0){mo--;day+=new Date(today.getFullYear(),today.getMonth(),0).getDate();}
  if(mo<0){y--;mo+=12;}
  const parts=[];
  if(y>0){parts.push(y+(y===1?" yr":" yrs"));if(mo>0)parts.push(mo+(mo===1?" mo":" mos"));}
  else if(mo>0){parts.push(mo+(mo===1?" mo":" mos"));if(day>0)parts.push(day+(day===1?" day":" days"));}
  else{parts.push(day===0?"Joined today":day+(day===1?" day":" days"));}
  return{text:parts.join(" "),title:"Joined "+fmtLong(d),cls:"ok"};
}

/* ── HELPERS ── */
function esc(s){return(s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
const AV=["#3E5C76","#5B7B7A","#7A5C7E","#6E7C4E","#9A6A4F","#4E5D8C","#7C6A3C","#566273"];
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return h;}
function initials(n){const w=n.trim().split(/\s+/).filter(Boolean);if(!w.length)return"?";return((w[0][0]||"")+(w.length>1?w[w.length-1][0]:"")).toUpperCase();}
function phone(r){const d=(r||"").replace(/[^\d]/g,"");if(!d)return null;let disp="+"+d;if(d.length===12&&d.startsWith("20"))disp=`+20 ${d.slice(2,5)} ${d.slice(5,8)} ${d.slice(8)}`;return{tel:"+"+d,disp};}

// Normalise Google Drive sharing links to direct image URLs
function photoUrl(raw){
  if(!raw)return null;
  raw=raw.toString().trim();
  if(!raw)return null;
  // Extract Google Drive file ID
  let m=raw.match(/\/d\/([a-zA-Z0-9_-]{25,})/);
  if(!m)m=raw.match(/[?&]id=([a-zA-Z0-9_-]{25,})/);
  if(m){
    // Use Google Drive direct download with thumbnail — most reliable for cross-origin
    return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w120`;
  }
  if(raw.includes("googleusercontent.com")||raw.includes("drive.google.com"))return raw;
  return raw;
}

/* ── SEARCH ── */
function ancestorsOf(p){const a=new Set();let c=p.parent;while(c){a.add(c.id);c=c.parent;}return a;}
function computeSearch(){
  if(!query)return{active:false};
  const hits=new Set(),keep=new Set();
  DATA.forEach(p=>{if((p.name+" "+p.title).toLowerCase().includes(query)){hits.add(p.id);keep.add(p.id);ancestorsOf(p).forEach(id=>keep.add(id));}});
  return{active:true,hits,keep};
}

/* ── CARD HTML ── */
function cardHTML(p,s){
  const vac=isVacant(p);
  const role=classifyRole(p);
  const isRoot=!p.parent;
  const imgUrl=!vac?photoUrl(p.photo):null;
  const avFallbackBg=AV[hash(p.name)%AV.length];
  const avFallbackTxt=esc(initials(p.name));
  const av=vac
    ?`<div class="avatar vac">+</div>`
    :imgUrl
      ?`<div class="avatar av-photo" style="background:#D8DDE6" data-fb-bg="${avFallbackBg}" data-fb-txt="${avFallbackTxt}"><img src="${esc(imgUrl)}" alt="${esc(p.name)}" onerror="avImgFail(this.parentElement)" /></div>`
      :`<div class="avatar" style="background:${avFallbackBg}">${avFallbackTxt}</div>`;
  const ten=tenure(p.join);
  const footer=vac
    ?`<div class="foot"><span class="pill-open">Open role</span></div>`
    :`<div class="foot"><span class="tenure ${ten.cls}" title="${esc(ten.title)}">${ICON.clock}<span class="ten-label">Tenure in company:&nbsp;</span><b>${esc(ten.text)}</b></span></div>`;
  const mailC=p.mail
    ?`<a class="contact" href="mailto:${esc(p.mail)}">${ICON.mail}<span class="val">${esc(p.mail)}</span></a>`
    :`<span class="contact empty">${ICON.mail}<span class="val">No email</span></span>`;
  const ph=phone(p.mobile);
  const phoneC=ph
    ?`<a class="contact" href="tel:${esc(ph.tel)}">${ICON.phone}<span class="val">${esc(ph.disp)}</span></a>`
    :`<span class="contact empty">${ICON.phone}<span class="val">No mobile</span></span>`;
  const waC=ph
    ?`<a class="contact" href="https://wa.me/${esc(ph.tel.replace(/\+/,''))}" target="_blank" style="color:#25D366">${ICON.whatsapp}<span class="val">WhatsApp</span></a>`
    :"";
  const upLabel=isRoot&&p.reports?`<div class="reports-up">${ICON.up}<span>Reports to ${esc(p.reports)}</span></div>`:"";
  let pill="";
  if(!vac){
    if(role==="manager")    pill=`<div class="role-pill pill-mgr"><span class="dot-sm"></span>Manager</div>`;
    else if(role==="supervisor") pill=`<div class="role-pill pill-sup"><span class="dot-sm"></span>Supervisor</div>`;
    else if(role==="tl")    pill=`<div class="role-pill pill-tl"><span class="dot-sm"></span>Team Leader</div>`;
  }
  let cls="card";
  if(isRoot) cls+=" root";
  if(!vac&&role==="manager")     cls+=" layer1";
  if(!vac&&role==="supervisor")  cls+=" role-supervisor";
  if(!vac&&role==="tl")          cls+=" role-tl";
  if(vac) cls+=" vacant";
  if(s.active){if(s.hits.has(p.id))cls+=" hit";else if(!s.keep.has(p.id))cls+=" dim";}
  let toggle="";
  if(p.children.length){
    const isCol=!s.active&&collapsed.has(keyOf(p));
    toggle=`<button class="toggle" data-toggle="${esc(keyOf(p))}" aria-label="${isCol?'Expand':'Collapse'} ${esc(p.name)}'s team">`
      +(isCol?ICON.plus+`<span class="cnt">${p.children.length}</span>`:ICON.minus)+`</button>`;
  }
  return`<div class="node"><div class="${cls}">${upLabel}${pill}
    <div class="top">${av}<div class="who">
      <div class="pname${vac?' vac':''}" title="${esc(p.name)}">${esc(p.name||"To be filled")}</div>
      <div class="ptitle" title="${esc(p.title)}">${esc(p.title)}</div>
    </div></div>
    <div class="contacts">${mailC}${phoneC}${waC}</div>
    ${footer}${toggle}
  </div></div>`;
}

/* ── TREE RENDERER ──
   Root centred, L1 direct reports in a HORIZONTAL row,
   their children (L2+) stacked VERTICALLY below each.
── */
function renderTree(roots,s){
  if(!roots.length)return`<div class="empty-state"><h2>No people yet</h2><p>Add people to the Org Chart tab.</p></div>`;
  return roots.map(r=>renderRoot(r,s)).join("");
}

function renderRoot(root,s){
  const showKids=root.children.length&&(s.active||!collapsed.has(keyOf(root)));
  let html=`<div class="root-col">${cardHTML(root,s)}`;
  if(showKids){
    html+=`<div class="trunk"></div>`;
    html+=renderL1Row(root.children,s);
  }
  html+=`</div>`;
  return html;
}

function renderL1Row(l1s,s){
  // Build the horizontal row of L1 manager columns
  let html=`<div class="l1-row">`;
  l1s.forEach(child=>{
    const showKids=child.children.length&&(s.active||!collapsed.has(keyOf(child)));
    html+=`<div class="l1-col">`;
    html+=`<div class="l1-drop"></div>`;
    html+=cardHTML(child,s);
    if(showKids){
      html+=`<div class="l1-trunk"></div>`;
      html+=renderVcBlock(child.children,s);
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  return html;
}

// Sort order: supervisor (0) → team leader (1) → other (2) → vacant (3)
// Within each group, maintain original sheet order
function roleOrder(p){
  if(isVacant(p)) return 3;
  const t=(p.title||"").toLowerCase();
  if(t.includes("supervisor")) return 0;
  if(t.includes("team leader")||t.includes("team lead")) return 1;
  return 2;
}
function sortedChildren(children){
  // stable sort — preserves original order within same group
  return [...children].sort((a,b)=>roleOrder(a)-roleOrder(b));
}

function renderVcBlock(children,s){
  let html=`<div class="vc-block">`;
  html+=`<div class="vc-rail"></div>`;
  sortedChildren(children).forEach(gc=>{
    html+=`<div class="vc-item">`;
    html+=`<div class="vc-arm"></div>`;
    html+=cardHTML(gc,s);
    html+=`</div>`;
  });
  html+=`</div>`;
  return html;
}

/* ── RENDER ── */
function render(){
  const tree=document.getElementById("tree");
  const s=computeSearch();
  tree.innerHTML=renderTree(ROOTS,s);
  const total=DATA.length,open=DATA.filter(isVacant).length;
  document.getElementById("stat-total").textContent=total;
  document.getElementById("stat-filled").textContent=total-open;
  document.getElementById("stat-open").textContent=open;
  applyZoom();
}

/* ── DATA ── */
function ingest(people){DATA=people;ROOTS=buildTree(people);}
function loadSnapshot(){ingest(buildFromCSV(SNAPSHOT_CSV));render();centerOnce();}

function setSync(state){
  const el=document.getElementById("sync"),label=document.getElementById("sync-label");
  el.className="sync "+state;
  if(state==="live"){const t=lastSync?lastSync.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"";label.innerHTML=`<b>Live</b> · synced ${t}`;}
  else if(state==="syncing"){label.textContent="Syncing…";}
  else if(state==="error"){label.innerHTML=`Last sync · <span class="retry" id="retry">retry</span>`;const r=document.getElementById("retry");if(r)r.onclick=()=>sync();}
}

async function fetchCSV(){
  const base=SHEET_CSV_URL+"&cachebust="+Date.now();
  // Try direct first (works locally / when CORS is open)
  try{
    const r=await fetch(base,{cache:"no-store",mode:"cors"});
    if(r.ok){const t=await r.text();if(t.trim().length>50)return t;}
  }catch(_){}
  // Try each CORS proxy in order
  for(const proxy of CORS_PROXIES){
    try{
      const r=await fetch(proxy(base),{cache:"no-store"});
      if(r.ok){const t=await r.text();if(t.trim().length>50)return t;}
    }catch(_){}
  }
  throw new Error("All fetch attempts failed");
}

async function sync(){
  setSync("syncing");
  try{
    const text=await fetchCSV();
    const people=buildFromCSV(text);
    if(!people.length)throw new Error("empty");
    ingest(people);lastSync=new Date();render();setSync("live");
  }catch(e){setSync("error");}
}

/* ── ZOOM ── */
function applyZoom(){document.getElementById("stage").style.zoom=zoom;document.getElementById("zoom-level").textContent=Math.round(zoom*100)+"%";}
function setZoom(z){zoom=Math.min(1.4,Math.max(.35,+z.toFixed(2)));applyZoom();}

let centered=false;
function centerOnce(){
  if(centered)return;centered=true;
  requestAnimationFrame(()=>{
    const c=document.getElementById("canvas"),st=document.getElementById("stage");
    c.scrollLeft=Math.max(0,(st.scrollWidth-c.clientWidth)/2);
  });
}

/* ── EVENTS ── */
document.getElementById("tree").addEventListener("click",e=>{
  const t=e.target.closest("[data-toggle]");if(!t)return;
  const k=t.getAttribute("data-toggle");
  if(collapsed.has(k))collapsed.delete(k);else collapsed.add(k);
  render();
});
document.getElementById("search").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});
document.getElementById("expand-all").onclick=()=>{collapsed.clear();render();};
document.getElementById("collapse-all").onclick=()=>{
  collapsed.clear();
  DATA.forEach(p=>{if(p.children.length&&p.parent)collapsed.add(keyOf(p));});
  render();
};
document.getElementById("zoom-in").onclick=()=>setZoom(zoom+.1);
document.getElementById("zoom-out").onclick=()=>setZoom(zoom-.1);
document.getElementById("zoom-reset").onclick=()=>setZoom(1);

function switchTab(t){

const OC_API="https://script.google.com/macros/s/AKfycbyYPfLlrAmGwjWNUGI4HbwfKFPUzF5M4WU3KN35Du2dXYNaFAv1uUCT-46XCJP9K-5PlQ/exec?type=oncall";

function ocParseDate(val){
  if(!val)return null;
  if(val instanceof Date)return isNaN(val)?null:val;
  const s=val.toString().trim();if(!s)return null;
  let m=s.match(/^(\d+)-([A-Za-z]+)-(\d+)$/);
  if(m)return new Date(`${m[2]} ${m[1]}, ${m[3]}`);
  const d=new Date(s);return isNaN(d)?null:d;
}
function ocFmt(val){
  const d=ocParseDate(val);if(!d)return(val||"").toString();
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
}
function ocParseRows(rows){
  const entries=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const name=(r[1]||"").toString().trim();
    const d=ocParseDate(r[0]);
    if(!d||!name)continue;
    entries.push({date:d,name,mail:(r[2]||"").toString().trim(),mobile:(r[3]||"").toString().trim(),photo:(r[4]||"").toString().trim()});
  }
  return entries;
}
function ocAvBg(name){return AV[hash(name||"?")%AV.length];}
function ocAvHtml(name,photo,cls){
  let imgSrc=null;
  if(photo&&photo.startsWith("http"))imgSrc=photoUrl(photo);
  if(!imgSrc){
    const nl=name.toLowerCase().trim();
    const p=DATA.find(x=>{const xl=x.name.toLowerCase().trim();return xl===nl||xl.includes(nl)||nl.includes(xl);});
    if(p)imgSrc=photoUrl(p.photo);
  }
  const bg=ocAvBg(name);const ini=initials(name)||"?";
  if(imgSrc)return`<div class="${cls}" style="background:${bg}" data-fb-bg="${bg}" data-fb-txt="${esc(ini)}"><img src="${esc(imgSrc)}" alt="${esc(ini)}" onerror="avImgFail(this.parentElement)"></div>`;
  return`<div class="${cls}" style="background:${bg}">${esc(ini)}</div>`;
}
function ocRender(entries){
  const now=new Date();now.setHours(0,0,0,0);
  let currents=[],upcoming=[],past=[];
  entries.forEach(w=>{
    const d=new Date(w.date);d.setHours(0,0,0,0);
    if(d.getTime()===now.getTime())currents.push(w);
    else if(d>now)upcoming.push(w);
    else past.push(w);
  });
  document.getElementById("live-pill").style.display=currents.length?"":"none";
  let html="";
  let heroList=[],heroIsUpcoming=false;
  if(currents.length){heroList=currents;}
  else if(upcoming.length){
    const earliest=new Date(upcoming[0].date);earliest.setHours(0,0,0,0);
    heroList=upcoming.filter(w=>{const d=new Date(w.date);d.setHours(0,0,0,0);return d.getTime()===earliest.getTime();});
    heroIsUpcoming=true;
  }
  const isCur=currents.length>0;
  if(heroList.length){
    const panels=heroList.map(hero=>{
      const ph=phone(hero.mobile);const av=ocAvHtml(hero.name,hero.photo,"oc-hero-av");
      return`<div class="oc-hero-panel">${av}<div class="oc-hero-body">
        <div class="oc-hero-name">${esc(hero.name)}</div>
        <div class="oc-hero-date">${ocFmt(hero.date)}</div>
        <div class="oc-hero-btns">
          ${hero.mail?`<a class="oc-hero-btn primary" href="mailto:${esc(hero.mail)}">${ICON.mail}&nbsp;${esc(hero.mail)}</a>`:""}
          ${ph?`<a class="oc-hero-btn secondary" href="tel:${esc(ph.tel)}">${ICON.phone}&nbsp;${esc(ph.disp)}</a>`:""}
          ${ph?`<a class="oc-hero-btn whatsapp" href="https://wa.me/${esc(ph.tel.replace(/\+/,''))}" target="_blank">${ICON.whatsapp}&nbsp;WhatsApp</a>`:""}
        </div></div></div>`;
    }).join('<div class="oc-hero-divider"></div>');
    html+=`<div class="oc-hero"><div class="oc-eyebrow oc-eyebrow-top">${isCur?`<span class="oc-pulse"></span>On duty today`:`⏱&nbsp;Next on-call`}</div><div class="oc-hero-panels">${panels}</div></div>`;
  }
  const heroDateTs=heroList.length?(new Date(heroList[0].date).setHours(0,0,0,0)):null;
  const upList=upcoming.filter(w=>{const d=new Date(w.date);d.setHours(0,0,0,0);return heroIsUpcoming?d.getTime()!==heroDateTs:true;});
  if(upList.length){
    html+=`<div class="oc-section">Upcoming</div><div class="oc-grid">`;
    upList.forEach(w=>{
      const ph=phone(w.mobile);
      html+=`<div class="oc-card"><div class="oc-card-date">${ocFmt(w.date)}</div>
        <div class="oc-person">${ocAvHtml(w.name,w.photo,"oc-av")}<div class="oc-name-block"><div class="oc-name">${esc(w.name)}</div>${(()=>{const ph=phone(w.mobile);return ph?`<a class="oc-wa-btn" href="https://wa.me/${ph.tel.replace(/\+/,'')}" target="_blank">${ICON.whatsapp} WhatsApp</a>`:"";})()} </div></div>
        <div class="oc-contacts">
          ${w.mail?`<a class="contact" href="mailto:${esc(w.mail)}">${ICON.mail}<span class="val">${esc(w.mail)}</span></a>`:""}
          ${ph?`<a class="contact" href="tel:${esc(ph.tel)}">${ICON.phone}<span class="val">${esc(ph.disp)}</span></a>`:""}
          ${ph?`<a class="contact" href="https://wa.me/${esc(ph.tel.replace(/\+/,''))}" target="_blank" style="color:#25D366">${ICON.whatsapp}<span class="val">WhatsApp</span></a>`:""}
        </div></div>`;
    });
    html+=`</div>`;
  }
  if(past.length){
    html+=`<div class="oc-section">Past</div><div class="oc-grid">`;
    [...past].reverse().forEach(w=>{
      const ph=phone(w.mobile);
      html+=`<div class="oc-card is-past"><div class="oc-card-date">${ocFmt(w.date)}</div>
        <div class="oc-person">${ocAvHtml(w.name,w.photo,"oc-av")}<div class="oc-name-block"><div class="oc-name">${esc(w.name)}</div>${(()=>{const ph=phone(w.mobile);return ph?`<a class="oc-wa-btn" href="https://wa.me/${ph.tel.replace(/\+/,'')}" target="_blank">${ICON.whatsapp} WhatsApp</a>`:"";})()} </div></div>
        <div class="oc-contacts">
          ${w.mail?`<a class="contact" href="mailto:${esc(w.mail)}">${ICON.mail}<span class="val">${esc(w.mail)}</span></a>`:""}
          ${ph?`<a class="contact" href="tel:${esc(ph.tel)}">${ICON.phone}<span class="val">${esc(ph.disp)}</span></a>`:""}
          ${ph?`<a class="contact" href="https://wa.me/${esc(ph.tel.replace(/\+/,''))}" target="_blank" style="color:#25D366">${ICON.whatsapp}<span class="val">WhatsApp</span></a>`:""}
        </div></div>`;
    });
    html+=`</div>`;
  }
  if(!html)html=`<div class="empty-state"><h2>No schedule found</h2><p>Add dates to the On-Call tab in the sheet.</p></div>`;
  document.getElementById("oc-main").innerHTML=html;
}
async function fetchOncall(){
  const base=OC_API+"&cachebust="+Date.now();
  try{const r=await fetch(base,{cache:"no-store",mode:"cors"});if(r.ok){const j=await r.json();if(Array.isArray(j)&&j.length)return j;}}catch(_){}
  for(const proxy of CORS_PROXIES){
    try{const r=await fetch(proxy(base),{cache:"no-store"});if(r.ok){const t=await r.text();if(t.trim().startsWith("["))return JSON.parse(t);}}catch(_){}
  }
  throw new Error("All fetch attempts failed");
}
async function syncOncall(){
  try{const rows=await fetchOncall();if(!Array.isArray(rows))throw new Error("bad data");ocRender(ocParseRows(rows));}
  catch(e){document.getElementById("oc-main").innerHTML=`<div class="empty-state"><h2>Could not load on-call schedule</h2><p>${esc(e.message)}</p></div>`;}
}
syncOncall();
setInterval(syncOncall,REFRESH_MS);

// Convert hex color to "r,g,b" string for rgba()
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function sbBuild(){
  const board=document.getElementById("sb-board");board.innerHTML="";
  let total=0,active=0,soon=0;
  SB_DATA.teams.forEach(team=>{
    const col=document.createElement("div");col.className="sb-col";
    const hdr=document.createElement("div");hdr.className="sb-col-header";hdr.style.background=team.color;
    hdr.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2.2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>${team.name}<span class="sb-col-header-count">${team.stores.length} stores</span>`;
    col.appendChild(hdr);
    const body=document.createElement("div");body.className="sb-col-body";
    team.stores.forEach(store=>{
      const isSoon=store.status==="soon";
      if(isSoon)soon++;else active++;total++;
      const card=document.createElement("div");card.className="sb-card";
      card.dataset.status=store.status;card.dataset.name=store.name.toLowerCase();card.dataset.team=team.name;
      card.innerHTML=`<div class="sb-card-icon" style="background:${team.color}18;color:${team.color}">${isSoon?`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`}</div><div class="sb-card-body"><div class="sb-card-name">${store.name}</div></div><span class="sb-card-badge ${isSoon?"badge-soon":"badge-active"}">${isSoon?"Soon":"Active"}</span>`;
      body.appendChild(card);
    });
    col.appendChild(body);board.appendChild(col);
  });
  document.getElementById("st-total").textContent=total;
  document.getElementById("st-active").textContent=active;
  document.getElementById("st-soon").textContent=soon;
  document.getElementById("st-teams").textContent=SB_DATA.teams.length;
  sbBuildTeamPanel("sb-team-marwan","Marwan","#1a3a6b");

function sbBuildTeamPanel(elId,mgrFirst,color){
  const el=document.getElementById(elId);if(!el)return;el.innerHTML="";

  // Panel background: solid color at top fading to near-white
  el.style.background=`linear-gradient(180deg, ${color}22 0%, ${color}08 40%, ${color}04 100%)`;

  const hd=document.createElement("div");hd.className="sb-panel-heading";hd.style.background=color;
  hd.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2.2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>${mgrFirst}'s Team`;
  el.appendChild(hd);

  if(!DATA||!DATA.length){const ph=document.createElement("p");ph.style.cssText="font-size:10px;color:var(--muted);padding:8px 10px";ph.textContent="Loading…";el.appendChild(ph);return;}

  const mgr=DATA.find(p=>p.name.toLowerCase().startsWith(mgrFirst.toLowerCase())&&!isVacant(p));
  if(!mgr){const ph=document.createElement("p");ph.style.cssText="font-size:10px;color:var(--muted);padding:8px 10px";ph.textContent="Manager not found";el.appendChild(ph);return;}

  // Collect all members, count total for opacity gradient
  const members=[];
  function walk(parentId){
    DATA.filter(p=>p.parent&&p.parent.id===parentId).forEach(p=>{
      const role=classifyRole(p);
      if(role==="supervisor"||role==="tl"||isVacant(p)) members.push({p,role});
      walk(p.id);
    });
  }
  walk(mgr.id);

  // Render with fading row backgrounds
  const total=members.length||1;
  members.forEach(({p,role},i)=>{
    const opacity=(0.18-(i/total)*0.14).toFixed(3);
    const card=sbMemberCard(p,role);
    card.style.background=`rgba(${hexToRgb(color)},${opacity})`;
    el.appendChild(card);
  });
}

function sbMemberCard(p,role){
  const vac=isVacant(p);
  const bg=AV[hash(p.name)%AV.length];
  const ini=initials(p.name)||"?";
  const imgUrl=!vac?photoUrl(p.photo):null;
  const avHtml=imgUrl
    ?`<div class="sb-member-av" style="background:${bg}" data-fb-bg="${bg}" data-fb-txt="${esc(ini)}"><img src="${esc(imgUrl)}" alt="${esc(ini)}" onerror="avImgFail(this.parentElement)"></div>`
    :`<div class="sb-member-av" style="background:${vac?"#CDD3DD":bg};color:${vac?"#9AA1AD":"#fff"}">${vac?`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`:esc(ini)}</div>`;
  const ph=phone(p.mobile);
  const callBtn=ph?`<a class="sb-member-btn call" href="tel:${esc(ph.tel)}" title="Call">${ICON.phone}<span>Call</span></a>`:'';
  const mailBtn=p.mail?`<a class="sb-member-btn mail" href="mailto:${esc(p.mail)}" title="Email">${ICON.mail}<span>Email</span></a>`:'';
  const waBtn=ph?`<a class="sb-member-btn wa" href="https://wa.me/${esc(ph.tel.replace(/\+/,''))}" target="_blank" title="WhatsApp">${ICON.whatsapp}<span>WhatsApp</span></a>`:'';
  const btns=(callBtn||mailBtn||waBtn)?`<div class="sb-member-btns">${callBtn}${mailBtn}${waBtn}</div>`:'';
  // Role badge — derived from classifyRole, same as org chart
  let roleCls="",roleLabel="";
  if(role==="supervisor"){roleCls="role-sup";roleLabel="Supervisor";}
  else if(role==="tl"){roleCls="role-tl";roleLabel="Team Leader";}
  const roleBadge=roleLabel?`<span class="sb-member-role ${roleCls}">${roleLabel}</span>`:"";
  const div=document.createElement("div");div.className="sb-member";
  div.innerHTML=`<div class="sb-member-top">
    ${avHtml}
    <div class="sb-member-meta">
      <div class="sb-member-name">${vac?"Open role":esc(p.name)}</div>
      <div class="sb-member-title">${esc(p.title||"")}</div>
    </div>
    ${roleBadge}
  </div>${btns}`;
  return div;
}

function sbSetFilter(btn,val){
  sbCurrentFilter=val;
  document.querySelectorAll(".sb-filter-btn").forEach(b=>{
    const on=b.dataset.filter===val;b.classList.toggle("active",on);
    b.style.background=on?(val==="active"?"#1E7A5C":val==="soon"?"#B8860B":"#1B2330"):"";
    b.style.color=on?"#fff":"";
  });
  sbFilter();
}
function sbFilter(){
  const q=document.getElementById("sb-search").value.toLowerCase().trim();
  document.querySelectorAll(".sb-card").forEach(card=>{
    const nm=!q||card.dataset.name.includes(q)||card.dataset.team.toLowerCase().includes(q);
    const sm=sbCurrentFilter==="all"||card.dataset.status===sbCurrentFilter;
    card.classList.toggle("hidden",!(nm&&sm));
  });
}
